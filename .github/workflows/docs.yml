name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'docs-site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Top-level permissions are minimal; the deploy job widens its own
# token to what the GitHub Pages deployment action needs. Same
# principle as tests.yml — restrict by default, escalate per job.
permissions:
  contents: read

# Queue Pages deployments. We deliberately do NOT cancel in-progress
# runs: a half-deployed site is worse than a slightly stale one. The
# latest commit wins, but only after the previous run finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build site

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none
          tools: composer:v2

      # See tests.yml — same setup-php / token-masking workaround.
      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.composer/cache/files
          key: composer-docs-${{ hashFiles('docs-site/composer.json') }}
          restore-keys: |
            composer-docs-

      - name: Install Composer dependencies
        working-directory: docs-site
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Build site
        working-directory: docs-site
        run: php build.php

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write       # required to publish a deployment
      id-token: write    # required for OIDC-attested deploy

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
