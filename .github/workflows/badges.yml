name: Badges

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metrics:
    runs-on: ubuntu-latest
    # Needs write access to push the computed JSON files to the orphan
    # `badges` branch. Other jobs in this repo keep `contents: read`
    # because they don't mutate the repo; this one explicitly opts in.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite
          coverage: none
          tools: composer:v2

      # See tests.yml for the rationale on overwriting auth.json directly.
      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.composer/cache/files
          key: composer-badges-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-badges-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run tests with JUnit log
        env:
          DB_CONNECTION: sqlite
        run: vendor/bin/phpunit --log-junit junit.xml

      - name: Compute matrix size from tests.yml
        id: matrix
        run: |
          # Sum every Unit+Feature cell that actually runs, across all three
          # test jobs: `test-13` (Laravel 13 × PHP × DB), `test-legacy`
          # (Laravel 11/12 × PHP × DB), and `test-newest` (newest DB engines
          # on 8.4/13). Keep keys quoted — bare `test-13` parses as subtraction.
          L13_PHP=$(yq '.jobs["test-13"].strategy.matrix.php | length' .github/workflows/tests.yml)
          L13_DB=$(yq '.jobs["test-13"].strategy.matrix.db | length' .github/workflows/tests.yml)
          LEGACY_PHP=$(yq '.jobs["test-legacy"].strategy.matrix.php | length' .github/workflows/tests.yml)
          LEGACY_LARAVEL=$(yq '.jobs["test-legacy"].strategy.matrix.laravel | length' .github/workflows/tests.yml)
          LEGACY_DB=$(yq '.jobs["test-legacy"].strategy.matrix.db | length' .github/workflows/tests.yml)
          NEWEST_DB=$(yq '.jobs["test-newest"].strategy.matrix.db | length' .github/workflows/tests.yml)
          L13_CELLS=$((L13_PHP * L13_DB))
          LEGACY_CELLS=$((LEGACY_PHP * LEGACY_LARAVEL * LEGACY_DB))
          NEWEST_CELLS=$((NEWEST_DB))
          CELLS=$((L13_CELLS + LEGACY_CELLS + NEWEST_CELLS))
          if [ "$CELLS" -eq 0 ]; then
            echo "::error::Matrix cell count is 0 — the test-job structure in tests.yml likely changed. Update the yq paths in this step." >&2
            exit 1
          fi
          echo "cells=$CELLS" >> "$GITHUB_OUTPUT"
          echo "Matrix size: test-13 ${L13_PHP}×${L13_DB}=${L13_CELLS} + test-legacy ${LEGACY_PHP}×${LEGACY_LARAVEL}×${LEGACY_DB}=${LEGACY_CELLS} + test-newest ${NEWEST_DB}=${NEWEST_CELLS} = $CELLS"

      - name: Compute badge JSON
        run: php .github/scripts/compute-badge-metrics.php junit.xml badges-out "${{ steps.matrix.outputs.cells }}"

      - name: Publish to badges branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Stash the freshly generated JSONs out of the worktree so the
          # branch switch below cannot disturb them.
          mkdir -p /tmp/badge-staging
          cp badges-out/*.json /tmp/badge-staging/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            git fetch origin badges --depth=1
            git checkout badges
            rm -f ./*.json
          else
            # First run: create an orphan branch with no history. `git rm
            # -rf .` clears the index/worktree of every file inherited from
            # the source branch, leaving only the untracked staging in /tmp.
            git checkout --orphan badges
            git rm -rf . >/dev/null
          fi

          cp /tmp/badge-staging/*.json .
          git add ./*.json

          if git diff --cached --quiet; then
            echo "Badges unchanged; nothing to commit."
            exit 0
          fi

          git commit -m "chore(badges): refresh metrics from ${GITHUB_SHA::7}"
          git push -u origin badges
