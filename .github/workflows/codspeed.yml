name: CodSpeed

# Continuous performance tracking. CodSpeed measures every test in
# the Performance suite as a walltime benchmark and posts a regression
# report on PRs.
#
# Wall-clock mode is used (not Valgrind/instrumented) because the
# benchmarks touch a real database — instrumented mode is designed
# for deterministic CPU-bound micro-benchmarks, walltime is the
# right pick for DB-touching integration benchmarks.
#
# Sqlite-only by design: CodSpeed compares against a baseline, and
# baseline stability matters more than backend coverage. The
# multi-backend Performance workflow continues to cover MySQL /
# MariaDB / PostgreSQL on label-trigger.
#
# Auth: CodSpeed uses OIDC — no CODSPEED_TOKEN secret needed.
# Install the CodSpeed GitHub App on the repo (https://codspeed.io)
# and the action below picks up identity from id-token: write.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, pcntl
          coverage: none
          tools: composer:v2

      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-codspeed-${{ hashFiles('composer.json') }}
          restore-keys: composer-codspeed-

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      # Installed at workflow runtime (not in composer.json) because the
      # bridge's PHPUnit constraint may lag this package's `^11|^12`.
      # Pinning at the edge keeps local installs and the test matrix
      # untouched.
      - name: Install CodSpeed PHPUnit bridge
        run: composer require --dev --no-interaction --update-with-all-dependencies "codspeedhq/phpunit-bridge:*"

      - name: Run benchmarks under CodSpeed
        uses: CodSpeedHQ/action@v4
        with:
          run: vendor/bin/phpunit --testsuite Performance
        env:
          DB_CONNECTION: sqlite
