name: OpenSSF Scorecard

# Supply-chain security posture report. Runs weekly + on push to
# master and uploads results to:
#   - GitHub code scanning (Security tab → Code scanning alerts)
#   - https://securityscorecards.dev (public dashboard, badge data)
#
# No secrets needed — the workflow's GITHUB_TOKEN is sufficient for
# the default checks. Some checks (branch-protection,
# webhooks) require a fine-grained PAT stored as SCORECARD_TOKEN if
# you want them to run; without it those checks are skipped.

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [master]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes scores to securityscorecards.dev so the README
          # badge can render. Drop this if you'd rather keep the
          # results private to the Security tab.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3
        with:
          sarif_file: results.sarif
