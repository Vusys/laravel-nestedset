name: Tests

on:
  push:
    branches: [master]
  pull_request:
    # `ready_for_review` lets flipping a draft PR to ready trigger the
    # whole pipeline; while the PR is a draft the per-job draft guard
    # (`github.event.pull_request.draft == false`) holds every job quiet,
    # so no CI minutes burn until the PR is marked ready.
    types: [opened, synchronize, reopened, ready_for_review]

# Workflow-wide minimal token. A read-only contents token cannot rewrite
# the repo, comment on PRs, or interact with packages — keeps the
# auto-issued GITHUB_TOKEN harmless even if its value leaks.
permissions:
  contents: read

# A new push (or the draft→ready flip) supersedes the in-flight pipeline
# for the same ref instead of stacking a long serial chain behind it.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Staged, fail-fast pipeline. Cheap deterministic checks gate the expensive
# ones:
#
#   tier 0  static-analysis + actionlint            (style / linters)
#     │
#     ▼
#   tier 1  test-13  ‖  runabout  ‖  fuzz-pinned     (primary + deterministic
#     │                                               property checks, all DBs)
#     │        test-newest (allow-failure, non-gating — newest-stable engines)
#     ▼
#   tier 2  test-legacy                              (Laravel 11 + 12 matrix)
#
# runabout and fuzz-pinned use *pinned* seeds, so they are deterministic and
# safe as required gates — a red is a real regression, never flake. The
# random-seed exploration stays on fuzz.yml's weekly cron (non-gating).
# They sit in tier 1 alongside test-13 because they finish (~1–2 min) well
# inside test-13's cross-backend wall, so they cost ~zero extra wall-clock
# yet block the expensive Laravel 11/12 matrix the moment they go red.
#
# The DB service images are pinned to an explicit floor — the oldest
# supported engine per backend (mysql:8.4, mariadb:11.4, postgres:15); if
# the suite is green there it is green on everything newer. test-newest
# runs the same suite on the newest GA images (mysql:9, mariadb:11.8,
# postgres:18) behind `continue-on-error`, purely as a forward-breakage
# heads-up — it never gates a merge.
# ---------------------------------------------------------------------------

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    name: Static analysis & code style
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/php-setup
        with:
          php: '8.3'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Larastan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

      - name: Run Rector (dry-run)
        run: vendor/bin/rector process --dry-run --no-progress-bar

      - name: Run Pint (test mode)
        run: vendor/bin/pint --test

  actionlint:
    runs-on: ubuntu-latest
    name: Lint workflows
    # Cheap on every PR, and the only meaningful check on a github-actions
    # Dependabot bump (which skips the PHP matrix below).
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0

  test-13:
    needs: [static-analysis, actionlint]
    runs-on: ubuntu-latest
    # A github-actions Dependabot bump (an action SHA) changes zero PHP,
    # so the whole PHP matrix is irrelevant — actionlint covers it instead.
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && !startsWith(github.head_ref, 'dependabot/github_actions/') }}

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        db: [sqlite, mysql, mariadb, pgsql]
        include:
          - { db: sqlite,  label: 'SQLite',        db_connection: sqlite }
          - { db: mysql,   label: 'MySQL 8.4',     db_connection: mysql,   db_host: '127.0.0.1', db_port: '3306', db_database: testing, db_username: root,     db_password: password }
          - { db: mariadb, label: 'MariaDB 11.4',  db_connection: mariadb, db_host: '127.0.0.1', db_port: '3307', db_database: testing, db_username: root,     db_password: password }
          - { db: pgsql,   label: 'PostgreSQL 15', db_connection: pgsql,   db_host: '127.0.0.1', db_port: '5432', db_database: testing, db_username: postgres, db_password: password }
          # Coverage on one cell per backend so backend-specific code paths
          # (LATERAL on PG/MySQL, STRAIGHT_JOIN on MySQL, derived shape on
          # MariaDB, correlated fallback on SQLite) all appear covered.
          # Codecov merges per-flag uploads from the same commit.
          - { php: '8.4', db: sqlite,  coverage: true }
          - { php: '8.4', db: pgsql,   coverage: true }
          - { php: '8.4', db: mariadb, coverage: true }
          - { php: '8.4', db: mysql,   coverage: true }

    name: "PHP ${{ matrix.php }} / Laravel 13 / ${{ matrix.label }}"

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: testing
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/php-setup
        with:
          php: ${{ matrix.php }}
          laravel: '13.0'
          testbench: '11.0'
          coverage: ${{ matrix.coverage && 'pcov' || 'none' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        env:
          DB_CONNECTION: ${{ matrix.db_connection }}
          DB_HOST: ${{ matrix.db_host }}
          DB_PORT: ${{ matrix.db_port }}
          DB_DATABASE: ${{ matrix.db_database }}
          DB_USERNAME: ${{ matrix.db_username }}
          DB_PASSWORD: ${{ matrix.db_password }}
        run: vendor/bin/phpunit ${{ matrix.coverage && '--coverage-clover=coverage.xml' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: coverage.xml
          # Tag each backend's upload so Codecov merges them per-flag
          # rather than the last-uploaded report overwriting the rest.
          flags: ${{ matrix.db }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  runabout:
    needs: [static-analysis, actionlint]
    runs-on: ubuntu-latest
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && !startsWith(github.head_ref, 'dependabot/github_actions/') }}

    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mysql, mariadb, pgsql]
        include:
          - { db: sqlite,  label: 'SQLite',        db_connection: sqlite }
          - { db: mysql,   label: 'MySQL 8.4',     db_connection: mysql,   db_host: '127.0.0.1', db_port: '3306', db_database: testing, db_username: root,     db_password: password }
          - { db: mariadb, label: 'MariaDB 11.4',  db_connection: mariadb, db_host: '127.0.0.1', db_port: '3307', db_database: testing, db_username: root,     db_password: password }
          - { db: pgsql,   label: 'PostgreSQL 15', db_connection: pgsql,   db_host: '127.0.0.1', db_port: '5432', db_database: testing, db_username: postgres, db_password: password }

    name: "Runabout / ${{ matrix.label }}"

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: testing
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/php-setup
        with:
          php: '8.4'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Runabout journeys (pinned seeds)
        env:
          DB_CONNECTION: ${{ matrix.db_connection }}
          DB_HOST: ${{ matrix.db_host }}
          DB_PORT: ${{ matrix.db_port }}
          DB_DATABASE: ${{ matrix.db_database }}
          DB_USERNAME: ${{ matrix.db_username }}
          DB_PASSWORD: ${{ matrix.db_password }}
        run: vendor/bin/phpunit --group runabout

  fuzz-pinned:
    needs: [static-analysis, actionlint]
    runs-on: ubuntu-latest
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && !startsWith(github.head_ref, 'dependabot/github_actions/') }}

    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mysql, mariadb, pgsql]
        include:
          - { db: sqlite,  label: 'SQLite',        db_connection: sqlite }
          - { db: mysql,   label: 'MySQL 8.4',     db_connection: mysql,   db_host: '127.0.0.1', db_port: '3306', db_database: testing, db_username: root,     db_password: password }
          - { db: mariadb, label: 'MariaDB 11.4',  db_connection: mariadb, db_host: '127.0.0.1', db_port: '3307', db_database: testing, db_username: root,     db_password: password }
          - { db: pgsql,   label: 'PostgreSQL 15', db_connection: pgsql,   db_host: '127.0.0.1', db_port: '5432', db_database: testing, db_username: postgres, db_password: password }

    name: "Fuzz (pinned) / ${{ matrix.label }}"

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: testing
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/php-setup
        with:
          php: '8.4'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Default (pinned) seeds — deterministic. FuzzerConfig's pinned seeds
      # catch known regressions; the weekly fuzz.yml cron does random-seed
      # exploration separately.
      - name: Run fuzzers (pinned seeds)
        env:
          DB_CONNECTION: ${{ matrix.db_connection }}
          DB_HOST: ${{ matrix.db_host }}
          DB_PORT: ${{ matrix.db_port }}
          DB_DATABASE: ${{ matrix.db_database }}
          DB_USERNAME: ${{ matrix.db_username }}
          DB_PASSWORD: ${{ matrix.db_password }}
        run: composer fuzz

  # Newest-stable early warning. One lane per networked engine on the
  # newest GA image, so forward-breakage (a dialect change in an upcoming
  # release) shows up here before it becomes the pinned floor — without
  # doubling every matrix cell. `continue-on-error` keeps it non-gating:
  # a red here is a heads-up to investigate, never a merge blocker. It
  # deliberately sits outside test-legacy's `needs` so it can never gate.
  # SQLite is excluded — setup-php already tracks a recent build.
  test-newest:
    needs: [static-analysis, actionlint]
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && !startsWith(github.head_ref, 'dependabot/github_actions/') }}

    strategy:
      fail-fast: false
      matrix:
        db: [mysql, mariadb, pgsql]
        # `label` names the engine + its newest-stable version so the check
        # title says exactly what it exercises (e.g. "MySQL 9") rather than a
        # bare "newest" that drifts meaning as the pins move.
        include:
          - { db: mysql,   label: 'MySQL 9',       db_connection: mysql,   db_host: '127.0.0.1', db_port: '3306', db_database: testing, db_username: root,     db_password: password }
          - { db: mariadb, label: 'MariaDB 11.8',  db_connection: mariadb, db_host: '127.0.0.1', db_port: '3307', db_database: testing, db_username: root,     db_password: password }
          - { db: pgsql,   label: 'PostgreSQL 18', db_connection: pgsql,   db_host: '127.0.0.1', db_port: '5432', db_database: testing, db_username: postgres, db_password: password }

    name: "PHP 8.4 / Laravel 13 / ${{ matrix.label }}"

    services:
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: testing
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/php-setup
        with:
          php: '8.4'
          laravel: '13.0'
          testbench: '11.0'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        env:
          DB_CONNECTION: ${{ matrix.db_connection }}
          DB_HOST: ${{ matrix.db_host }}
          DB_PORT: ${{ matrix.db_port }}
          DB_DATABASE: ${{ matrix.db_database }}
          DB_USERNAME: ${{ matrix.db_username }}
          DB_PASSWORD: ${{ matrix.db_password }}
        run: vendor/bin/phpunit

  test-legacy:
    needs: [test-13, runabout, fuzz-pinned]
    runs-on: ubuntu-latest
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && !startsWith(github.head_ref, 'dependabot/github_actions/') }}

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        laravel: ['11.0', '12.0']
        db: [sqlite, mysql, mariadb, pgsql]
        include:
          - { laravel: '11.0', testbench: '9.0' }
          - { laravel: '12.0', testbench: '10.0' }
          - { db: sqlite,  label: 'SQLite',        db_connection: sqlite }
          - { db: mysql,   label: 'MySQL 8.4',     db_connection: mysql,   db_host: '127.0.0.1', db_port: '3306', db_database: testing, db_username: root,     db_password: password }
          - { db: mariadb, label: 'MariaDB 11.4',  db_connection: mariadb, db_host: '127.0.0.1', db_port: '3307', db_database: testing, db_username: root,     db_password: password }
          - { db: pgsql,   label: 'PostgreSQL 15', db_connection: pgsql,   db_host: '127.0.0.1', db_port: '5432', db_database: testing, db_username: postgres, db_password: password }

    name: "PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / ${{ matrix.label }}"

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: testing
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/php-setup
        with:
          php: ${{ matrix.php }}
          laravel: ${{ matrix.laravel }}
          testbench: ${{ matrix.testbench }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        env:
          DB_CONNECTION: ${{ matrix.db_connection }}
          DB_HOST: ${{ matrix.db_host }}
          DB_PORT: ${{ matrix.db_port }}
          DB_DATABASE: ${{ matrix.db_database }}
          DB_USERNAME: ${{ matrix.db_username }}
          DB_PASSWORD: ${{ matrix.db_password }}
        run: vendor/bin/phpunit
